name: Release Drafter

on:
  push:
    branches:
      - main

# Permissions for default token (secrets.GITHUB_TOKEN)
permissions:
  contents: read
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: release-drafter/release-drafter@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        with:
          config-name: release-drafter.yml # the default, loads '.github/release-drafter.yml'
  update_prerelease_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: release-drafter/release-drafter@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        with:
          prerelease: true
          prerelease-identifier: "rc" # Use semver identifiers : alpha, beta, rc, etc
          config-name: release-drafter.yml # the default, loads '.github/release-drafter.yml'
